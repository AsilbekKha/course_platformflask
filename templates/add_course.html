<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Course</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- Your CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='courses.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='add_course.css') }}">
</head>
<body>

<div class="container add-course-container">

    <div class="page-header">
        <h1>
            <i class="fas fa-plus-circle"></i> Create a New Course
        </h1>
        <a href="{{ url_for('all_courses') }}" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back to Courses
        </a>
    </div>

    {% if error %}
        <div class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            {{ error }}
        </div>
    {% endif %}

    <form action="{{ url_for('add_course') }}" method="POST" enctype="multipart/form-data" class="add-course-form">

        <div class="form-group">
            <label for="title">
                <i class="fas fa-heading"></i> Course Title
            </label>
            <input
                type="text"
                id="title"
                name="title"
                placeholder="e.g. Python Programming"
                required
            >
        </div>

        <div class="form-group">
            <label for="description">
                <i class="fas fa-align-left"></i> Description
            </label>
            <textarea
                id="description"
                name="description"
                rows="6"
                placeholder="Describe what students will learn..."
                required
            ></textarea>
        </div>

        <div class="form-group">
            <label for="thumbnail">
                <i class="fas fa-image"></i> Course Thumbnail
            </label>
            <div class="file-upload-wrapper">
                <input
                    type="file"
                    id="thumbnail"
                    name="thumbnail"
                    accept=".png,.jpg,.jpeg"
                >
                <small>PNG, JPG or JPEG (max 5MB)</small>
            </div>
        </div>

        <button type="submit" class="btn-submit">
            <i class="fas fa-save"></i> Create Course
        </button>

    </form>

</div>

</body>
</html>
