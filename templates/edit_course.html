<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Edit Course</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../static/courses.css">
    <link rel="stylesheet" href="../static/edit_course.css">
</head>
<body>
<div class="container add-course-container">

    <div class="page-header">
        <h1>
            <i class="fas fa-edit"></i> Edit your course
        </h1>
        <a href="{{ url_for('all_courses') }}" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back to Courses
        </a>
    </div>

    <!-- Add enctype="multipart/form-data" for file upload -->
    <form action="{{ url_for('edit_course', course_id=course_details.id) }}" method="POST" class="add-course-form" enctype="multipart/form-data">

        <div class="form-group">
            <label for="title">
                <i class="fas fa-heading"></i> Course Title
            </label>
            <input
                value="{{ course_details.title }}"
                type="text"
                id="title"
                name="title"
                placeholder="e.g. Python Programming"
                required
            >
        </div>

        <div class="form-group">
            <label for="description">
                <i class="fas fa-align-left"></i> Description
            </label>
            <textarea
                id="description"
                name="description"
                rows="8"
                required
            >{{ course_details.description }}</textarea>
        </div>

        <!-- File Upload Section -->
        <div class="form-group file-upload-group">
            <label for="thumbnail">
                <i class="fas fa-image"></i> Course Thumbnail
            </label>

            <!-- Display current thumbnail if exists -->
            {% if course_details.thumbnail %}
            <div class="current-thumbnail">
                <p>Current thumbnail:</p>
                <img src="{{ url_for('static', filename='uploads/' + course_details.thumbnail) }}" alt="Current thumbnail" class="thumbnail-preview">
                <small class="file-hint">Leave empty to keep current image</small>
            </div>
            {% endif %}

            <!-- File input -->
            <div class="file-input-wrapper">
                <input
                    type="file"
                    id="thumbnail"
                    name="thumbnail"
                    accept="image/*"
                    class="file-input"
                >
                <label for="thumbnail" class="file-input-label">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span>Choose an image</span>
                </label>
                <span class="file-name" id="file-name">No file selected</span>
            </div>
            <small class="file-hint">Supported formats: JPG, PNG, GIF, WebP (Max 5MB)</small>
        </div>

        <button type="submit" class="btn-submit">
            <i class="fas fa-save"></i> Update Course
        </button>

    </form>

</div>

<script>
    // Display selected file name
    document.getElementById('thumbnail').addEventListener('change', function(e) {
        const fileName = e.target.files[0] ? e.target.files[0].name : 'No file selected';
        document.getElementById('file-name').textContent = fileName;
    });
</script>

</body>
</html>
