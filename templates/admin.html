<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='courses.css') }}">
</head>

<body>

<div class="container">

    <div class="page-header">
        <h1>Admin Panel</h1>

        <a href="{{ url_for('all_courses') }}" class="add-btn">
            Back
        </a>
    </div>

    <div class="course-grid">

    {% for course in courses %}

        <div class="course-card">

            <img
            src="{{ url_for('static', filename='images/' + (course.thumbnail or 'default-course.jpg')) }}"
            class="course-image">

            <h2>{{ course.title }}</h2>

            <p>{{ course.description }}</p>

            <p>
                <strong>Teacher ID:</strong>
                {{ course.teacher_id }}
            </p>

            <div class="action-group">

                <a
                href="{{ url_for('edit_course', course_id=course.id) }}"
                class="btn btn-edit">
                    Edit
                </a>

                <form
                action="{{ url_for('delete_course', course_id=course.id) }}"
                method="POST">

                    <button
                    class="btn btn-delete"
                    onclick="return confirm('Delete this course?')">

                        Delete

                    </button>

                </form>

            </div>

        </div>

    {% endfor %}

    </div>

</div>

</body>
</html>
